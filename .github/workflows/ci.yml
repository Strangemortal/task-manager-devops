name: Django DevOps Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install Linting Tools
      run: |
        pip install flake8 black isort
    - name: Run Flake8
      run: flake8 .
    - name: Run Black Check
      run: black --check .
    - name: Run Isort Check
      run: isort --check-only .

  test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Set up Python
      uses: actions/setup-python@v5
      with:
        python-version: "3.12"
    - name: Install Dependencies
      run: |
        python -m pip install --upgrade pip
        # Install without psycopg2-binary to avoid build failures in CI runner if not needed
        grep -v "psycopg2-binary" requirements.txt > req_ci.txt
        pip install -r req_ci.txt
    - name: Run PyTest
      run: pytest

  build-docker:
    needs: test
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - name: Build Docker Image
      run: |
        docker build -t task_manager:test .
