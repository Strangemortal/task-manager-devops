{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TaskAssign</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{% static 'main/css/style.css' %}">
</head>
<body>
    <nav class="navbar">
        <a href="{% url 'home' %}" class="nav-brand">
            <i class="fa-solid fa-layer-group"></i> TaskAssign
        </a>
        <ul class="nav-links">
            {% if user.is_authenticated %}
                <li><a href="{% url 'dashboard' %}"><i class="fa-solid fa-chart-line"></i> Dashboard</a></li>
                {% if user.is_superuser %}
                    <li><a href="{% url 'superuser_dashboard' %}"><i class="fa-solid fa-shield-halved"></i> Superuser</a></li>
                    <li><a href="{% url 'create_task' %}"><i class="fa-solid fa-plus"></i> Create Task</a></li>
                {% endif %}
                <li><a href="{% url 'task_list' %}"><i class="fa-solid fa-list"></i> All Tasks</a></li>
                <li><a href="{% url 'logout' %}" class="btn btn-secondary"><i class="fa-solid fa-right-from-bracket"></i> Logout</a></li>
            {% else %}
                <li><a href="{% url 'login' %}"><i class="fa-solid fa-right-to-bracket"></i> Login</a></li>
                <li><a href="{% url 'register' %}" class="btn btn-primary"><i class="fa-solid fa-user-plus"></i> Register</a></li>
            {% endif %}
        </ul>
    </nav>
    
    <div class="container">
        {% block content %}
        {% endblock %}
    </div>
</body>
</html>
