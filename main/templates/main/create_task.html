{% extends "main/base.html" %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card glass-panel" style="max-width: 600px;">
        <h2 class="page-title text-center mb-4">Create New Task</h2>
        
        <form method="post">
            {% csrf_token %}
            
            <div class="form-group">
                <label for="{{ form.title.id_for_label }}">Task Title</label>
                {{ form.title }}
            </div>
            
            <div class="form-group">
                <label for="{{ form.description.id_for_label }}">Description</label>
                {{ form.description }}
            </div>
            
            <div class="form-group">
                <label for="{{ form.assignees.id_for_label }}">Assign Members</label>
                <div class="checkbox-list glass-panel" style="padding: 1rem; max-height: 200px; overflow-y: auto; background: rgba(0,0,0,0.2);">
                    {{ form.assignees }}
                </div>
            </div>

            <style>
                .checkbox-list ul {
                    list-style: none;
                    padding: 0;
                }
                .checkbox-list li {
                    margin-bottom: 0.5rem;
                    display: flex;
                    align-items: center;
                    gap: 0.5rem;
                }
                .checkbox-list input[type="checkbox"] {
                    width: auto;
                    cursor: pointer;
                }
                .checkbox-list label {
                    display: inline;
                    margin: 0;
                    cursor: pointer;
                    color: var(--text-color);
                }
            </style>
            
            <div style="display: flex; justify-content: flex-end; gap: 1rem; margin-top: 2rem;">
                <a href="{% url 'dashboard' %}" class="btn btn-secondary">Cancel</a>
                <button type="submit" class="btn btn-primary"><i class="fa-solid fa-check"></i> Create Task</button>
            </div>
        </form>
    </div>
</div>
{% endblock %}
