{% extends "main/base.html" %}

{% block content %}
<div class="glass-panel text-center mt-4">
    <h1 class="page-title mb-2">Welcome to TaskAssign</h1>
    <p class="mb-4" style="color: var(--text-muted); font-size: 1.2rem;">
        The next-generation task management platform for agile teams.
    </p>
    
    {% if user.is_authenticated %}
        <div class="mb-3">
            <p class="mb-3">Welcome back, <strong>{{ user.username }}</strong>!</p>
            <a href="{% url 'dashboard' %}" class="btn btn-primary">
                <i class="fa-solid fa-arrow-right"></i> Go to Dashboard
            </a>
        </div>
    {% else %}
        <div style="display: flex; gap: 1rem; justify-content: center;">
            <a href="{% url 'login' %}" class="btn btn-secondary">Login</a>
            <a href="{% url 'register' %}" class="btn btn-primary">Get Started</a>
        </div>
    {% endif %}
</div>
{% endblock %}
