{% extends "main/base.html" %}

{% block content %}
<div class="auth-wrapper">
    <div class="auth-card glass-panel">
        <h2 class="page-title text-center mb-3">Welcome Back</h2>
        
        {% if error %}
            <div style="background: rgba(239, 68, 68, 0.2); border: 1px solid var(--danger-color); padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; color: #f87171;">
                {{ error }}
            </div>
        {% endif %}
        
        {% if info %}
            <div style="background: rgba(59, 130, 246, 0.2); border: 1px solid var(--accent-color); padding: 1rem; border-radius: 8px; margin-bottom: 1.5rem; color: #93c5fd;">
                <i class="fa-solid fa-circle-info"></i> {{ info }}
            </div>
        {% endif %}
        
        <form method="post" action="{% url 'login' %}">
            {% csrf_token %}
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" required>
            </div>
            
            <div class="form-group">
                <label for="password">Password</label>
                <input type="password" id="password" name="password" required>
            </div>
            
            <button type="submit" class="btn btn-primary" style="width: 100%;">
                <i class="fa-solid fa-right-to-bracket"></i> Login
            </button>
        </form>
        
        <div class="text-center mt-4">
            <p style="color: var(--text-muted);">Don't have an account? <a href="{% url 'register' %}">Sign up here</a></p>
        </div>
    </div>
</div>
{% endblock %}
